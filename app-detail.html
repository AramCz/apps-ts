<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Detail</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px 20px;
            min-height: 100vh;

            background: linear-gradient(
                to bottom,
                #ced8d9 0%,
                #ffffff 20%,
                #ffffff 80%,
                #ced8d9 100%
            );
        }

        /* ===== MENU ===== */
        .menu {
            width: 100%;
            max-width: 602px;
            margin: 0 auto 30px auto;

            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .menu a {
            color: #333;
            text-decoration: none;
            font-size: 16px;
        }

        .menu a:hover {
            text-decoration: underline;
        }

        .menu-line {
            margin: 0 auto 40px auto;
            width: 80%;
            border: none;
            border-top: 1px solid #ccc;
        }

        /* ===== HEADER ===== */
        .app-header {
            max-width: 750px;
            margin: 0 auto 30px auto;

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .icon {
            width: 110px;
            height: 110px;
            border-radius: 20px;
            overflow: hidden;
        }

        .icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info {
            text-align: left;
            max-width: 420px;
        }

        .info h1 {
            font-size: 22px;
            color: #333;
            margin-bottom: 8px;
        }

        .info p {
            font-size: 14px;
            color: #666;
            line-height: 1.4;
        }

        .btn {
            margin-top: 12px;
            display: inline-block;
            padding: 10px 16px;
            background: #333;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        /* ===== GALLERY ===== */
        .gallery {
            max-width: 750px;
            margin: 40px auto 0 auto;

            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .gallery img {
            width: 100%;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .gallery img:hover {
            transform: scale(1.03);
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
        }

        .modal img {
            max-width: 90%;
            max-height: 90%;
        }
    </style>
</head>

<body>

    <!-- MENU -->
    <nav class="menu">
        <a href="index.html">Home</a>
        <a href="apps.html">Apps</a>
        <a href="contact.html">Contact</a>
    </nav>

    <hr class="menu-line">

    <!-- HEADER -->
    <div class="app-header">

        <div class="icon">
            <img id="appIcon" src="">
        </div>

        <div class="info">
            <h1 id="appTitle">App Title</h1>
            <p id="appDesc">App description</p>

            <div class="btn">View in Store</div>
        </div>

    </div>

    <!-- GALLERY -->
    <div class="gallery" id="gallery"></div>

    <!-- MODAL -->
    <div class="modal" id="modal" onclick="closeModal()">
        <img id="modalImg">
    </div>

    <script>
        /* ===== DATABASE (LOCAL DATA) ===== */
        const apps = {
            expedition: {
                title: "Expedition 4x4",
                desc: "Advanced navigation and expedition tracking system for off-road adventures.",
                icon: "Images/expedition_small.png",
                images: [
                    "Images/head_1.png",
                    "Images/head_2.png",
                    "Images/head_3.png",
                    "Images/head_4.png"
                ]
            },

            offroad: {
                title: "Off Road Instrumentations",
                desc: "Vehicle dashboard system for off-road driving analytics and monitoring.",
                icon: "Images/OffRoad_small.png",
                images: [
                    "Images/head_1.png",
                    "Images/head_2.png",
                    "Images/head_3.png",
                    "Images/head_4.png"
                ]
            },

            forble: {
                title: "ForBLE",
                desc: "Bluetooth Low Energy tools for testing, scanning and diagnostics.",
                icon: "Images/ForBLE_small.png",
                images: [
                    "Images/head_1.png",
                    "Images/head_2.png"
                ]
            },

            forbike: {
                title: "ForBike",
                desc: "Bike tracking and performance analytics application.",
                icon: "Images/ForBike_small.png",
                images: [
                    "Images/head_1.png",
                    "Images/head_2.png"
                ]
            },

            puzzle: {
                title: "Family Puzzle",
                desc: "Fun interactive puzzle game for family entertainment.",
                icon: "Images/Puzzle_small.png",
                images: [
                    "Images/head_1.png",
                    "Images/head_2.png"
                ]
            },

            carmusic: {
                title: "Car Music",
                desc: "Music player optimized for driving experience.",
                icon: "Images/CarMusic_small.png",
                images: [
                    "Images/head_1.png",
                    "Images/head_2.png"
                ]
            }
        };

        /* ===== GET PARAM ===== */
        const params = new URLSearchParams(window.location.search);
        const appKey = params.get("app");

        const app = apps[appKey];

        /* ===== APPLY DATA ===== */
        if (app) {
            document.getElementById("appTitle").innerText = app.title;
            document.getElementById("appDesc").innerText = app.desc;
            document.getElementById("appIcon").src = app.icon;

            const gallery = document.getElementById("gallery");

            app.images.forEach(src => {
                const img = document.createElement("img");
                img.src = src;
                img.onclick = () => openModal(src);
                gallery.appendChild(img);
            });
        } else {
            document.getElementById("appTitle").innerText = "App not found";
        }

        /* ===== MODAL ===== */
        function openModal(src) {
            document.getElementById("modalImg").src = src;
            document.getElementById("modal").style.display = "flex";
        }

        function closeModal() {
            document.getElementById("modal").style.display = "none";
        }
    </script>

</body>
</html>
