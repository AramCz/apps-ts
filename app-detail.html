<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Detail</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px 20px;
            min-height: 100vh;

            background: linear-gradient(
                to bottom,
                #ced8d9 0%,
                #ffffff 20%,
                #ffffff 80%,
                #ced8d9 100%
            );
        }

        .menu {
            width: 100%;
            max-width: 602px;
            margin: 0 auto 30px auto;
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .menu a {
            color: #333;
            text-decoration: none;
            font-size: 16px;
        }

        .menu-line {
            margin: 0 auto 40px auto;
            width: 80%;
            border-top: 1px solid #ccc;
        }

        .app-header {
            max-width: 750px;
            margin: 0 auto 30px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .icon {
            width: 110px;
            height: 110px;
            border-radius: 20px;
            overflow: hidden;
        }

        .icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info {
            text-align: left;
            max-width: 420px;
        }

        .details {
            max-width: 750px;
            margin: 75px auto 0 auto;
            text-align: left;
        }

        .gallery-section {
            max-width: 750px;
            margin: 40px auto 0 auto;
            text-align: left;
        }

        .gallery-section h2 {
            margin-bottom: 10px;
        }

        .gallery {
            display: grid;
            gap: 15px;
        }

        #portraitGallery {
            grid-template-columns: repeat(4, 1fr);
        }

        #landscapeGallery {
            grid-template-columns: repeat(2, 1fr);
            margin-top: 40px;
        }

        .gallery img {
            width: 100%;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .gallery img:hover {
            transform: scale(1.03);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
        }

        .modal img {
            max-width: 90%;
            max-height: 90%;
        }

    </style>
</head>

<body>

<!-- MENU -->
<nav class="menu">
    <a href="index.html">Home</a>
    <a href="apps.html">Apps</a>
    <a href="contact.html">Contact</a>
</nav>

<hr class="menu-line">

<!-- HEADER -->
<div class="app-header">
    <div class="icon">
        <img id="appIcon">
    </div>

    <div class="info">
        <h1 id="appTitle"></h1>
        <p id="appDesc"></p>
    </div>
</div>

<!-- DETAILS -->
<div class="details">
    <h2>About this app</h2>
    <p id="appFullDesc"></p>
</div>

<!-- GALLERIES -->
<div class="gallery-section" id="portraitSection">
    <h2>Portrait</h2>
    <div class="gallery" id="portraitGallery"></div>
</div>

<div class="gallery-section" id="landscapeSection">
    <h2>Landscape</h2>
    <div class="gallery" id="landscapeGallery"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
    <img id="modalImg">
</div>

<script>

const apps = {
    expedition: {
        title: "Expedition 4x4",
        desc: "Organize groups for expeditions.",
        fullDesc: "Full description here",
        icon: "Images/expedition_small.png",

        imagesPortrait: [
            "Images/head_1.png",
            "Images/head_2.png"
        ],

        imagesLandscape: [
            "Images/head_3.png",
            "Images/head_4.png"
        ]
    },

    offroad: {
        title: "Off Road Instrumentations",
        desc: "Off-road safety tool",
        fullDesc: "Full description here",
        icon: "Images/OffRoad_small.png",

        imagesPortrait: ["Images/head_1.png"],
        imagesLandscape: []
    }
};

const params = new URLSearchParams(window.location.search);
const appKey = params.get("app");
const app = apps[appKey];

if (app) {

    document.getElementById("appTitle").innerText = app.title;
    document.getElementById("appDesc").innerText = app.desc;
    document.getElementById("appFullDesc").innerText = app.fullDesc;
    document.getElementById("appIcon").src = app.icon;

    const portraitSection = document.getElementById("portraitSection");
    const landscapeSection = document.getElementById("landscapeSection");

    const portraitGallery = document.getElementById("portraitGallery");
    const landscapeGallery = document.getElementById("landscapeGallery");

    function addImages(list, container) {
        list.forEach(src => {
            const img = document.createElement("img");
            img.src = src;
            img.onclick = () => openModal(src);
            container.appendChild(img);
        });
    }

    if (app.imagesPortrait && app.imagesPortrait.length > 0) {
        addImages(app.imagesPortrait, portraitGallery);
    } else {
        portraitSection.style.display = "none";
    }

    if (app.imagesLandscape && app.imagesLandscape.length > 0) {
        addImages(app.imagesLandscape, landscapeGallery);
    } else {
        landscapeSection.style.display = "none";
    }
}

function openModal(src) {
    document.getElementById("modalImg").src = src;
    document.getElementById("modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
