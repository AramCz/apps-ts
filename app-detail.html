<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Detail</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px 20px;
            min-height: 100vh;

            background: linear-gradient(
                to bottom,
                #ced8d9 0%,
                #ffffff 20%,
                #ffffff 80%,
                #ced8d9 100%
            );
        }

        /* ===== MENU ===== */
        .menu {
            width: 100%;
            max-width: 602px;
            margin: 0 auto 30px auto;

            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .menu a {
            color: #333;
            text-decoration: none;
            font-size: 16px;
        }

        .menu a:hover {
            text-decoration: underline;
        }

        .menu-line {
            margin: 0 auto 40px auto;
            width: 80%;
            border: none;
            border-top: 1px solid #ccc;
        }

        /* ===== HEADER ===== */
        .app-header {
            max-width: 750px;
            margin: 0 auto 30px auto;

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .icon {
            width: 110px;
            height: 110px;
            border-radius: 20px;
            overflow: hidden;
        }

        .icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info {
            text-align: left;
            max-width: 420px;
        }

        .info h1 {
            font-size: 22px;
            color: #333;
            margin-bottom: 8px;
        }

        .info p {
            font-size: 14px;
            color: #666;
            line-height: 1.4;
        }

        .btn {
            margin-top: 12px;
            display: inline-block;
            padding: 8px 12px;
            background: #333;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }

        /* ===== DETAILS ===== */
        .details {
            max-width: 750px;
            margin: 35px auto 0 auto;
            text-align: left;
        }

        .details h2 {
            color: #333;
            margin-bottom: 15px;
        }

        .details p {
            color: #666;
            line-height: 1.7;
        }

        /* ===== GALLERY ===== */
        .gallery {
            max-width: 750px;
            margin: 40px auto 0 auto;

            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .gallery img {
            width: 100%;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .gallery img:hover {
            transform: scale(1.03);
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
        }

        .modal img {
            max-width: 90%;
            max-height: 90%;
        }
    </style>
</head>

<body>

    <!-- MENU -->
    <nav class="menu">
        <a href="index.html">Home</a>
        <a href="apps.html">Apps</a>
        <a href="contact.html">Contact</a>
    </nav>

    <hr class="menu-line">

    <!-- HEADER -->
    <div class="app-header">

        <div class="icon">
            <img id="appIcon" src="">
        </div>

        <div class="info">
            <h1 id="appTitle">App Title</h1>
            <p id="appDesc">App description</p>

            <div class="btn">View in App Store</div>
        </div>

    </div>

    <!-- DETAILS -->
    <div class="details">
        <h2>About this app</h2>
        <p id="appFullDesc"></p>
    </div>

    <!-- GALLERY -->
    <div class="gallery" id="gallery"></div>

    <!-- MODAL -->
    <div class="modal" id="modal" onclick="closeModal()">
        <img id="modalImg">
    </div>

    <script>
        const apps = {
            expedition: {
                title: "Expedition 4x4",
                desc: "Organize groups for expeditions, competitions or other purposes, track group participants and optionally take part in them.",
                fullDesc: "Text 1",
                icon: "Images/expedition_small.png",
                images: ["Images/head_1.png","Images/head_2.png","Images/head_3.png","Images/head_4.png"]
            },

            offroad: {
                title: "Off Road Instrumentations",
                desc: "This app is created for off road lovers. In off road conditions the main thing is security.",
                fullDesc: `Off Road Instrumentations is your essential tool for safe and exciting off-road adventures.
                
                        When driving off-road, safety is key — especially on uneven terrain where rollovers are a real danger. This app helps you monitor the tilt of your vehicle in real time, so you can stay in control and avoid risky situations.
                        The inclinometer shows how much your vehicle leans forward, backward, or sideways. You can also set a custom maximum tilt angle — once reached or exceeded, the app will trigger a visual and audible warning to alert you.
                        
                        Key Features:
                        ●  Inclinometer – Displays the vehicle’s tilt angle in degrees or percent.
                        ●  Custom Tilt Alerts – Set your own maximum tilt limit with visual and sound notifications.
                        ● Location Info – Shows your current latitude and longitude.
                        • Compass – Helps you stay oriented in any environment.
                        • Altimeter – Indicates your current altitude.
                        • Speedometer – Tracks your speed accurately.
                        • Max Tilt Recording – Automatically saves the steepest angles reached.
                        • Vehicle Image Editor – Add a picture of your vehicle from the gallery or take a new photo to personalize the app.
                        
                        Whether you’re climbing, descending, or exploring the unknown — Off Road Instrumentations gives you the key data to drive smarter and safer.
                        `,
                icon: "Images/OffRoad_small.png",
                images: ["Images/head_1.png","Images/head_2.png","Images/head_3.png","Images/head_4.png"]
            },

            forble: {
                title: "ForBLE",
                desc: "This app is designed to communicate with microcontrollers such as Arduino and others.",
                fullDesc: "Text 3",
                icon: "Images/ForBLE_small.png",
                images: ["Images/head_1.png","Images/head_2.png"]
            },

            forbike: {
                title: "ForBike",
                desc: "This app can be used as in everyday life and also when training.",
                fullDesc: "Text 4",
                icon: "Images/ForBike_small.png",
                images: ["Images/head_1.png","Images/head_2.png"]
            },

            puzzle: {
                title: "Family Puzzle",
                desc: "Enjoy a fun puzzle experience for people of all ages. Turn any photo into a puzzle and challenge yourself, friends or family.",
                fullDesc: "Text 5",
                icon: "Images/Puzzle_small.png",
                images: ["Images/head_1.png","Images/head_2.png"]
            },

            carmusic: {
                title: "Car Music",
                desc: "This app is designed especially for use in the car, but it can also be used elsewhere.",
                fullDesc: "Text 6",
                icon: "Images/CarMusic_small.png",
                images: ["Images/head_1.png","Images/head_2.png"]
            }
        };

        const params = new URLSearchParams(window.location.search);
        const appKey = params.get("app");
        const app = apps[appKey];

        if (app) {
            document.getElementById("appTitle").innerText = app.title;
            document.getElementById("appDesc").innerText = app.desc;
            document.getElementById("appFullDesc").innerText = app.fullDesc;
            document.getElementById("appIcon").src = app.icon;

            const gallery = document.getElementById("gallery");

            app.images.forEach(src => {
                const img = document.createElement("img");
                img.src = src;
                img.onclick = () => openModal(src);
                gallery.appendChild(img);
            });
        }

        function openModal(src) {
            document.getElementById("modalImg").src = src;
            document.getElementById("modal").style.display = "flex";
        }

        function closeModal() {
            document.getElementById("modal").style.display = "none";
        }
    </script>

</body>
</html>
