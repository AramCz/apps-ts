<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Detail</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px 20px;
            min-height: 100vh;

            background: linear-gradient(
                to bottom,
                #ced8d9 0%,
                #ffffff 20%,
                #ffffff 80%,
                #ced8d9 100%
            );
        }

        /* ===== MENU ===== */
        .menu {
            width: 100%;
            max-width: 602px;
            margin: 0 auto 30px auto;

            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .menu a {
            color: #333;
            text-decoration: none;
            font-size: 16px;
        }

        .menu a:hover {
            text-decoration: underline;
        }

        .menu-line {
            margin: 0 auto 40px auto;
            width: 80%;
            border: none;
            border-top: 1px solid #ccc;
        }

        /* ===== HEADER ===== */
        .app-header {
            max-width: 750px;
            margin: 0 auto 30px auto;

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }


        .icon {
            width: 110px;
            height: 110px;
            min-width: 110px;
            min-height: 110px;
            flex-shrink: 0;
        
            border-radius: 20px;
            overflow: hidden;
        }

        
         .icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        } 

        .info {
            text-align: left;
            max-width: 420px;
        }

        .info h1 {
            font-size: 22px;
            color: #333;
            margin-bottom: 8px;
        }

        .info p {
            font-size: 14px;
            color: #666;
            line-height: 1.4;
        }

        .btn {
            margin-top: 12px;
            display: inline-block;
            padding: 8px 12px;
            background: #333;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }

        /* ===== DETAILS ===== */
        .details {
            max-width: 750px;
            margin: 75px auto 0 auto;
            text-align: left;
        }

        .details h2 {
            color: #333;
            margin-bottom: 15px;
        }

        .details p {
            color: #666;
            line-height: 1.7;
        }

        /* ===== GALLERY ===== */
        .gallery-section {
            max-width: 750px;
            margin: 40px auto 0 auto;
            text-align: left;
        }

        .gallery-section h2 {
            margin-bottom: 10px;
            color: #333;
        }

        .gallery {
            display: grid;
            gap: 15px;
        }

        /* PORTRAIT = 4 */
        #galleryPortrait {
            grid-template-columns: repeat(4, 1fr);
        }

        /* LANDSCAPE = 3 */
        #galleryLandscape {
            grid-template-columns: repeat(3, 1fr);
            margin-top: 40px;
        }

        .gallery img {
            width: 100%;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .gallery img:hover {
            transform: scale(1.03);
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
        }

        .modal img {
            max-width: 90%;
            max-height: 90%;
        }
    </style>
</head>

<body>

    <!-- MENU -->
    <nav class="menu">
        <a href="index.html">Home</a>
        <a href="apps.html">Apps</a>
        <a href="contact.html">Contact</a>
    </nav>

    <hr class="menu-line">

    <!-- HEADER -->

        </div>

            <p id="appDesc">App description</p>

            <a
                id="appStoreButton"
                class="btn"
                href="#"

                style="text-decoration:none;"

                View in App Store
            </a>
        </div>

    </div>

    <div class="gallery-section" id="landscapeSection">

        const params = new URLSearchParams(window.location.search);
        const appKey = params.get("app");
        const app = apps[appKey];

        if (app) {

            document.getElementById("appTitle").innerText = app.title;
            document.getElementById("appDesc").innerText = app.desc;
            document.getElementById("appFullDesc").innerHTML = app.fullDesc; 
            document.getElementById("appIcon").src = app.icon;
            document.getElementById("appStoreButton").href = app.appStoreUrl;

            const videosContainer = document.getElementById("videosContainer");
            if (app.videos && app.videos.length > 0) {
            
                app.videos.forEach(video => {
            
                    const title = document.createElement("h2");
                    title.innerText = video.title;
                    title.style.marginTop = "40px";
                    title.style.marginBottom = "15px";
            
                    const iframe = document.createElement("iframe");
            
                    iframe.src = video.url;
                    iframe.width = "100%";
                    iframe.height = "450";
                    iframe.style.border = "none";
                    iframe.allowFullscreen = true;
            
                    videosContainer.appendChild(title);
                    videosContainer.appendChild(iframe);
                });
            }
            
            const portraitSection = document.getElementById("portraitSection");
            const landscapeSection = document.getElementById("landscapeSection");

            const portraitGallery = document.getElementById("galleryPortrait");
            const landscapeGallery = document.getElementById("galleryLandscape");

            function addImages(list, container) {
                list.forEach(src => {
                    const img = document.createElement("img");
                    img.src = src;
                    img.onclick = () => openModal(src);
                    container.appendChild(img);
                });
            }

            if (app.imagesPortrait && app.imagesPortrait.length > 0) {
                addImages(app.imagesPortrait, portraitGallery);
            } else {
                portraitSection.style.display = "none";
            }

            if (app.imagesLandscape && app.imagesLandscape.length > 0) {
                addImages(app.imagesLandscape, landscapeGallery);
            } else {
                landscapeSection.style.display = "none";
            }
        }

        function openModal(src) {
            document.getElementById("modalImg").src = src;
            document.getElementById("modal").style.display = "flex";
        }

        function closeModal() {
            document.getElementById("modal").style.display = "none";
        }
