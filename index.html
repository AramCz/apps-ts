<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apps Touch Screen</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background-color: #f0f0f0;
    text-align: center;
    padding: 40px 20px;
}

h1 {
    color: #333;
    margin-bottom: 15px;
}

p {
    color: #666;
    margin-bottom: 30px;
}

/* ===== CAROUSEL ===== */
.carousel {
    width: 100%;
    max-width: 602px;
    height: 450px;
    margin: 0 auto;
    overflow: hidden;
}

.slides {
    display: flex;
    height: 100%;
    transition: transform 0.5s ease;
}

.slides img {
    width: 100%;
    height: 100%;
    flex-shrink: 0;
    object-fit: contain;
}
</style>
</head>

<body>

<h1>Welcome to Apps Touch Screen</h1>
<p>We are glad that you visited our website.</p>

<div class="carousel">
    <div class="slides" id="slides">
        <img src="Images/head_1.png">
        <img src="Images/head_2.png">
        <img src="Images/head_3.png">
        <img src="Images/head_4.png">
        <img src="Images/head_5.png">
        <img src="Images/head_6.png">
    </div>
</div>

<script>
let index = 0;
const slides = document.getElementById("slides");
const total = slides.children.length;

let startX = 0;
let currentX = 0;
let isDragging = false;

function update() {
    slides.style.transform = `translateX(-${index * 100}%)`;
}

/* ===== AUTO ===== */
setInterval(() => {
    index++;
    if (index >= total) index = 0;
    update();
}, 3000);

update();

/* ===== TOUCH ===== */
slides.addEventListener("touchstart", (e) => {
    startX = e.touches[0].clientX;
    isDragging = true;
});

slides.addEventListener("touchend", (e) => {
    if (!isDragging) return;

    currentX = e.changedTouches[0].clientX;
    handleSwipe();
    isDragging = false;
});

/* ===== MOUSE ===== */
slides.addEventListener("mousedown", (e) => {
    startX = e.clientX;
    isDragging = true;
});

slides.addEventListener("mouseup", (e) => {
    if (!isDragging) return;

    currentX = e.clientX;
    handleSwipe();
    isDragging = false;
});

/* ===== SWIPE LOGIC ===== */
function handleSwipe() {
    let diff = startX - currentX;

    if (Math.abs(diff) > 50) {
        if (diff > 0) {
            index++;
        } else {
            index--;
        }
    }

    if (index < 0) index = total - 1;
    if (index >= total) index = 0;

    update();
}
</script>

</body>
</html>
