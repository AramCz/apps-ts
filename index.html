<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apps Touch Screen</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        
            background: linear-gradient(
                to bottom,
                 #ced8d9 0%
                 #ffffff 20%,
                 #ffffff 80%,
                 #ced8d9 100%
            );
        
            text-align: center;
            padding: 40px 20px;
            min-height: 100vh;
        }
        
        

        h1 {
            color: #333;
            margin-bottom: 15px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
        }

        /* ===== MENU ===== */
        .menu {
            width: 100%;
            max-width: 602px;
            margin: 0 auto 30px auto;
        
            display: flex;
            justify-content: center;
            gap: 25px;
        }
        
        .menu a {
            color: #333;
            text-decoration: none;
            font-size: 16px;
        }
        
        .menu a:hover {
            text-decoration: underline;
        }

        .menu-line {
            margin: 0 auto 30px auto;
            width: 80%;
            border: none;
            border-top: 1px solid #ccc;
        }
        
        /* ===== CAROUSEL ===== */
        .carousel {
            width: 100%;
            max-width: 602px;
            height: 450px;
            margin: 0 auto;
            overflow: hidden;
            position: relative;
        }

        .bottom-line {
            margin: 30px auto 30px auto;
            width: 80%;
            border: none;
            border-top: 1px solid #ccc;
        }
        
        /* ===== TRACK ===== */
        .slides {
            display: flex;
            height: 100%;
            transition: transform 0.5s ease;
        }

        /* ===== IMAGE ===== */
        .slides img {
            width: 100%;
            height: 100%;
            flex-shrink: 0;
            object-fit: contain;
        }

        /* ===== BUTTONS ===== */
        button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 18px;
            z-index: 10;
            border-radius: 8px;
        }

        #prev {
            left: 10px;
        }

        #next {
            right: 10px;
        }

        /* ===== THUMBNAILS ===== */
        .thumbnails {
            width: 100%;
            max-width: 602px;
            margin: 20px auto 0 auto;
            display: flex;
            justify-content: flex-end;
            gap: 5px;
        }

        .thumbnails button {
            position: static;
            transform: none;

            width: 50px;
            height: 50px;
            padding: 0;

            border: 1px solid #ccc;
            border-radius: 4px;

            background: transparent;
            overflow: hidden;
        }

        .thumbnails img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
    </style>
</head>

<body>

    <nav class="menu">
        <a href="#">Home</a>
        <a href="#">Apps</a>
        <a href="#">Contact</a>
    </nav>
    <hr class="menu-line">
    
    <h1>Welcome to Apps Touch Screen</h1>
    <p>We are glad that you visited our website.</p>

    <div class="carousel">
        <button id="prev">‹</button>
        <button id="next">›</button>

        <div class="slides" id="slides">
            <img src="Images/head_1.png">
            <img src="Images/head_2.png">
            <img src="Images/head_3.png">
            <img src="Images/head_4.png">
            <img src="Images/head_5.png">
            <img src="Images/head_6.png">
        </div>
    </div>

    <hr class="bottom-line">
    
    <!-- ===== THUMBNAILS ===== -->
    <div class="thumbnails">
        <button><img src="Images/expedition_small.png"></button>
        <button><img src="Images/OffRoad_small.png"></button>
        <button><img src="Images/ForBLE_small.png"></button>
        <button><img src="Images/ForBike_small.png"></button>
        <button><img src="Images/Puzzle_small.png"></button>
        <button><img src="Images/CarMusic_small.png"></button>
    </div>

    <script>
        let index = 0;
        const slides = document.getElementById("slides");
        const total = slides.children.length;

        /* ===== UPDATE ===== */
        function update() {
            slides.style.transform = `translateX(-${index * 100}%)`;
        }

        /* ===== AUTO ===== */
        setInterval(() => {
            nextSlide();
        }, 3000);

        update();

        /* ===== BUTTONS ===== */
        document.getElementById("next").addEventListener("click", nextSlide);
        document.getElementById("prev").addEventListener("click", prevSlide);

        function nextSlide() {
            index++;
            if (index >= total) index = 0;
            update();
        }

        function prevSlide() {
            index--;
            if (index < 0) index = total - 1;
            update();
        }

        /* ===== SWIPE ===== */
        let startX = 0;
        let currentX = 0;

        slides.addEventListener("touchstart", (e) => {
            startX = e.touches[0].clientX;
        });

        slides.addEventListener("touchend", (e) => {
            currentX = e.changedTouches[0].clientX;
            handleSwipe();
        });

        slides.addEventListener("mousedown", (e) => {
            startX = e.clientX;
        });

        slides.addEventListener("mouseup", (e) => {
            currentX = e.clientX;
            handleSwipe();
        });

        function handleSwipe() {
            let diff = startX - currentX;

            if (Math.abs(diff) > 50) {
                if (diff > 0) nextSlide();
                else prevSlide();
            }
        }
    </script>

</body>
</html>
