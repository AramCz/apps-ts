<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apps Touch Screen</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            text-align: center;
            padding: 40px 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 15px;
        }

        p {
            color: #666;
            margin-bottom: 40px;
            font-size: 18px;
        }

        .carousel {
            width: 600px;
            max-width: 100%;
            height: 450px;
            margin: 0 auto;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            background: white;
        }

        .slides {
            display: flex;
            width: 600%;
            height: 100%;
            animation: slideshow 24s infinite;
        }

        .slides img {
            width: 16.666%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes slideshow {
            0%, 14% {
                transform: translateX(0%);
            }

            16%, 30% {
                transform: translateX(-16.666%);
            }

            32%, 46% {
                transform: translateX(-33.333%);
            }

            48%, 62% {
                transform: translateX(-50%);
            }

            64%, 78% {
                transform: translateX(-66.666%);
            }

            80%, 94% {
                transform: translateX(-83.333%);
            }

            100% {
                transform: translateX(0%);
            }
        }

        @media (max-width: 768px) {
            .carousel {
                height: 220px;
            }

            h1 {
                font-size: 28px;
            }

            p {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <h1>Welcome to Apps Touch Screen</h1>

    <p>We are glad that you visited our website.</p>

    <div class="carousel">
        <div class="slides">
            <img src="Images/head_1.png">
            <img src="Images/head_1.png">
            <img src="Images/head_1.png">
            <img src="Images/head_1.png">
            <img src="Images/head_1.png">
            <img src="Images/head_1.png">
        </div>
    </div>

</body>
</html>
