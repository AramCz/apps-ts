<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apps Touch Screen</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            text-align: center;
            padding: 40px 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 15px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 18px;
        }

        /* ===== CAROUSEL ===== */
        .carousel {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            overflow: hidden;
        }

        .slides {
            display: flex;
            width: 600%;
            animation: slide 24s infinite;
        }

        .slides img {
            width: 100%;
            flex-shrink: 0;
            height: auto;
            display: block;
        }

        @keyframes slide {
            0%, 14% {
                transform: translateX(0%);
            }

            16%, 30% {
                transform: translateX(-100%);
            }

            32%, 46% {
                transform: translateX(-200%);
            }

            48%, 62% {
                transform: translateX(-300%);
            }

            64%, 78% {
                transform: translateX(-400%);
            }

            80%, 94% {
                transform: translateX(-500%);
            }

            100% {
                transform: translateX(0%);
            }
        }

        /* ===== MOBILE ===== */
        @media (max-width: 768px) {
            h1 {
                font-size: 24px;
            }

            p {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <h1>Welcome to Apps Touch Screen</h1>
    <p>We are glad that you visited our website.</p>

    <div class="carousel">
        <div class="slides">
            <img src="Images/head_1.png" alt="">
            <img src="Images/head_2.png" alt="">
            <img src="Images/head_3.png" alt="">
            <img src="Images/head_4.png" alt="">
            <img src="Images/head_5.png" alt="">
            <img src="Images/head_6.png" alt="">
        </div>
    </div>

</body>
</html>
